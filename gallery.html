<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Limbopix Studio</title>
<meta name="description" content="Browse Limbopix Studio's full portfolio — food photography, portraits, milestones, graduations, events, and design work. Orlando, FL.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── Variables ── */
:root {
  --black:  #080808;
  --dark:   #0d0d0d;
  --mid:    #111;
  --border: rgba(255,255,255,0.08);
  --cream:  #F4EFE6;
  --orange: #E8520A;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 56px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: padding 0.4s ease;
}
.nav-logo {
  text-decoration: none; display: flex; align-items: center;
}
.nav-logo img { height: 30px; width: auto; }
.nav-back {
  font-family: 'Syne', sans-serif; font-size: 0.65rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(244,239,230,0.5); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--cream); }
.nav-back::before { content: '←'; font-size: 1rem; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 140px 80px 60px;
  border-bottom: 1px solid var(--border);
}
.page-header-inner {
  display: flex; align-items: flex-end;
  justify-content: space-between;
}
.page-eyebrow {
  font-family: 'Syne', sans-serif; font-size: 0.6rem;
  font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.page-eyebrow::before {
  content: ''; display: inline-block;
  width: 28px; height: 1px; background: var(--orange);
}
.page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 700; line-height: 1.05;
  color: var(--cream);
}
.page-title em { font-style: italic; color: var(--orange); }
.page-count {
  font-family: 'Syne', sans-serif; font-size: 0.6rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(244,239,230,0.3); text-align: right;
}

/* ── CATEGORY TABS ── */
.category-bar {
  position: sticky; top: 73px; z-index: 100;
  background: rgba(8,8,8,0.96);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0;
  padding: 0 80px;
  overflow-x: auto;
  scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  font-family: 'Syne', sans-serif; font-size: 0.62rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(244,239,230,0.4);
  background: none; border: none; cursor: pointer;
  padding: 20px 24px;
  position: relative;
  transition: color 0.25s;
  white-space: nowrap;
}
.cat-btn::after {
  content: ''; position: absolute;
  bottom: 0; left: 24px; right: 24px; height: 2px;
  background: var(--orange);
  transform: scaleX(0); transition: transform 0.25s ease;
}
.cat-btn:hover { color: var(--cream); }
.cat-btn.active { color: var(--cream); }
.cat-btn.active::after { transform: scaleX(1); }

/* ── SESSIONS GRID ── */
.gallery-content {
  padding: 60px 80px 120px;
  min-height: 60vh;
}
.category-section {
  display: none;
}
.category-section.active {
  display: block;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

.category-section-title {
  font-family: 'Syne', sans-serif; font-size: 0.58rem;
  font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(244,239,230,0.25);
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.sessions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 3px;
}

/* ── SESSION CARD ── */
.session-card {
  position: relative;
  aspect-ratio: 4/3;
  min-height: 240px;
  overflow: hidden;
  cursor: pointer;
  background: var(--mid);
  display: block;
}
.session-card:hover .sc-img { transform: scale(1.05); }
.session-card:hover .sc-overlay { opacity: 1; }
.session-card:hover .sc-info { transform: translateY(0); opacity: 1; }

.sc-img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: block;
}

/* Placeholder gradient for cards without images */
.sc-placeholder {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(145deg, #1a0f00, #3d1f00, #0d0d0d);
  display: flex; align-items: center; justify-content: center;
}
.sc-placeholder-icon {
  font-size: 2rem; opacity: 0.2;
}

.sc-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(8,8,8,0.92) 0%, rgba(8,8,8,0.3) 50%, transparent 100%);
  opacity: 0.6;
  transition: opacity 0.35s ease;
  z-index: 1;
}
.sc-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 28px;
  transform: translateY(6px);
  opacity: 0.85;
  transition: all 0.35s ease;
  z-index: 2;
}
.sc-cat {
  font-family: 'Syne', sans-serif; font-size: 0.5rem;
  font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 6px;
}
.sc-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700; font-style: italic;
  color: var(--cream); margin-bottom: 4px;
}
.sc-meta {
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
  font-weight: 300; color: rgba(244,239,230,0.55);
  display: flex; align-items: center; gap: 10px;
}
.sc-meta span::after { content: '·'; margin-left: 10px; opacity: 0.4; }
.sc-meta span:last-child::after { display: none; }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(8,8,8,0.97);
  display: none;
  flex-direction: column;
}
.lightbox.open {
  display: flex;
  animation: lbIn 0.3s ease;
}
@keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }

.lb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.lb-title-group {}
.lb-cat {
  font-family: 'Syne', sans-serif; font-size: 0.52rem;
  font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 4px;
}
.lb-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 700; font-style: italic;
  color: var(--cream);
}
.lb-controls {
  display: flex; align-items: center; gap: 16px;
}
.lb-counter {
  font-family: 'Syne', sans-serif; font-size: 0.6rem;
  font-weight: 700; letter-spacing: 0.15em;
  color: rgba(244,239,230,0.35);
}
.lb-btn {
  background: none; border: 1px solid var(--border);
  color: var(--cream); cursor: pointer;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: all 0.2s;
}
.lb-btn:hover { background: var(--orange); border-color: var(--orange); }
.lb-close {
  background: none; border: none; color: rgba(244,239,230,0.5);
  cursor: pointer; font-size: 1.5rem; padding: 8px;
  transition: color 0.2s; line-height: 1;
}
.lb-close:hover { color: var(--cream); }

/* Main image area */
.lb-stage {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 24px;
}
.lb-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  animation: imgIn 0.25s ease;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
@keyframes imgIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: none; } }

/* Arrow buttons on stage */
.lb-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(8,8,8,0.6); border: 1px solid var(--border);
  color: var(--cream); cursor: pointer;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  z-index: 10;
}
.lb-arrow:hover { background: var(--orange); border-color: var(--orange); }
.lb-arrow-prev { left: 20px; }
.lb-arrow-next { right: 20px; }

/* Thumbnail strip */
.lb-thumbs {
  flex-shrink: 0;
  display: flex; gap: 4px;
  padding: 12px 40px;
  background: rgba(0,0,0,0.5);
  border-top: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--orange) transparent;
}
.lb-thumbs::-webkit-scrollbar { height: 3px; }
.lb-thumbs::-webkit-scrollbar-track { background: transparent; }
.lb-thumbs::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }

.lb-thumb {
  flex-shrink: 0;
  width: 64px; height: 48px;
  object-fit: cover;
  opacity: 0.4;
  cursor: pointer;
  transition: opacity 0.2s, outline 0.2s;
  outline: 2px solid transparent;
}
.lb-thumb.active {
  opacity: 1;
  outline: 2px solid var(--orange);
}
.lb-thumb:hover { opacity: 0.8; }

/* Thumb placeholder */
.lb-thumb-ph {
  flex-shrink: 0;
  width: 64px; height: 48px;
  background: var(--mid);
  opacity: 0.4;
  cursor: pointer;
  outline: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: rgba(255,255,255,0.2);
}
.lb-thumb-ph.active { opacity: 1; outline: 2px solid var(--orange); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: rgba(244,239,230,0.25);
}
.empty-state h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-style: italic;
  margin-bottom: 12px;
}
.empty-state p {
  font-size: 0.85rem; font-weight: 300;
}

/* ── FOOTER ── */
.gallery-footer {
  border-top: 1px solid var(--border);
  padding: 32px 80px;
  display: flex; align-items: center; justify-content: space-between;
}
.gf-copy {
  font-family: 'Syne', sans-serif; font-size: 0.58rem;
  font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(244,239,230,0.2);
}
.gf-link {
  font-family: 'Syne', sans-serif; font-size: 0.58rem;
  font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(244,239,230,0.3); text-decoration: none;
  transition: color 0.2s;
}
.gf-link:hover { color: var(--orange); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 20px 24px; }
  .page-header { padding: 120px 24px 40px; }
  .page-header-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
  .category-bar { padding: 0 24px; }
  .gallery-content { padding: 40px 24px 80px; }
  .sessions-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .lb-header { padding: 16px 20px; }
  .lb-thumbs { padding: 10px 20px; }
  .lb-arrow { display: none; }
  .gallery-footer { flex-direction: column; gap: 12px; padding: 24px; }
}
</style>
</head>

/* ═══════════════════════════════════════════════════════════
   GALLERY ENGINE — No need to edit below this line
═══════════════════════════════════════════════════════════ */

// Category gradient placeholders
const PLACEHOLDERS = {
  food:       'linear-gradient(145deg, #1a0a00, #3d1800, #6b2800)',
  portraits:  'linear-gradient(145deg, #0d0d0d, #1a1200, #3d2a00)',
  milestones: 'linear-gradient(145deg, #080808, #1f0e00, #e8520a22)',
  events:     'linear-gradient(145deg, #0d0d0d, #200d00, #5c2200)',
  design:     'linear-gradient(145deg, #080808, #1a0f00, #e8520a33)',
};

const ICONS = { food: '🍽', portraits: '📷', milestones: '🎓', events: '✨', design: '✏️' };

let currentPhotos = [];
let currentIdx = 0;
let currentSession = null;

function buildCard(session, catKey) {
  const card = document.createElement('div');
  card.className = 'session-card';
  card.dataset.cat = catKey;

  const coverUrl = session.cover || (session.photos && session.photos[0]) || '';
  const count = session.photos ? session.photos.length : 0;

  if (coverUrl) {
    const img = document.createElement('img');
    img.className = 'sc-img';
    img.src = coverUrl;
    img.alt = session.title;
    img.loading = 'lazy';
    card.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'sc-placeholder';
    ph.style.background = PLACEHOLDERS[catKey] || PLACEHOLDERS.food;
    ph.innerHTML = `<span class="sc-placeholder-icon">${ICONS[catKey] || '📷'}</span>`;
    card.appendChild(ph);
  }

  const overlay = document.createElement('div');
  overlay.className = 'sc-overlay';
  card.appendChild(overlay);

  const info = document.createElement('div');
  info.className = 'sc-info';
  info.innerHTML = `
    <div class="sc-cat">${session.category}</div>
    <div class="sc-title">${session.title}</div>
    <div class="sc-meta">
      <span>${session.date}</span>
      ${count > 0 ? `<span>${count} photo${count !== 1 ? 's' : ''}</span>` : ''}
    </div>
  `;
  card.appendChild(info);

  card.addEventListener('click', () => openLightbox(session, catKey));
  return card;
}

function buildSection(catKey, sessions) {
  const container = document.getElementById(`cat-${catKey}`);
  if (!container) return;

  if (!sessions || sessions.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>Coming soon.</h3><p>Sessions will appear here once uploaded.</p></div>`;
    return;
  }

  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'sessions-grid';

  sessions.forEach(session => {
    grid.appendChild(buildCard(session, catKey));
  });

  container.appendChild(grid);
}

function buildAllSection() {
  const container = document.getElementById('cat-all');
  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'sessions-grid';

  let total = 0;
  Object.entries(GALLERY).forEach(([catKey, sessions]) => {
    if (!sessions) return;
    sessions.forEach(session => {
      total += session.photos ? session.photos.length : 0;
      grid.appendChild(buildCard(session, catKey));
    });
  });

  container.appendChild(grid);

  // Update total count
  const tc = document.getElementById('total-count');
  if (tc) tc.textContent = total > 0 ? `${total} photos across all sessions` : '';
}

function buildAllSections() {
  Object.entries(GALLERY).forEach(([catKey, sessions]) => {
    buildSection(catKey, sessions);
  });
  buildAllSection();
}

/* ── Lightbox ── */
function openLightbox(session, catKey) {
  if (!session.photos || session.photos.length === 0) {
    // Show coming soon message
    alert(`${session.title} — photos coming soon!`);
    return;
  }

  currentPhotos = session.photos;
  currentSession = session;
  currentIdx = 0;

  document.getElementById('lb-cat').textContent = session.category;
  document.getElementById('lb-title').textContent = session.title;

  buildThumbs();
  showPhoto(0);

  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  currentPhotos = [];
  currentIdx = 0;
}

function showPhoto(idx) {
  if (idx < 0) idx = currentPhotos.length - 1;
  if (idx >= currentPhotos.length) idx = 0;
  currentIdx = idx;

  const img = document.getElementById('lb-img');
  img.style.animation = 'none';
  img.offsetHeight; // reflow
  img.style.animation = '';
  img.src = currentPhotos[idx];
  img.alt = `${currentSession.title} — photo ${idx + 1}`;

  document.getElementById('lb-counter').textContent = `${idx + 1} / ${currentPhotos.length}`;

  // Update thumbs
  document.querySelectorAll('.lb-thumb, .lb-thumb-ph').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  // Scroll active thumb into view
  const activethumb = document.querySelector('.lb-thumb.active, .lb-thumb-ph.active');
  if (activethumb) activethumb.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
}

function buildThumbs() {
  const strip = document.getElementById('lb-thumbs');
  strip.innerHTML = '';
  currentPhotos.forEach((url, i) => {
    if (url) {
      const t = document.createElement('img');
      t.className = 'lb-thumb';
      t.src = url; t.alt = `Photo ${i + 1}`;
      t.loading = 'lazy';
      t.addEventListener('click', () => showPhoto(i));
      strip.appendChild(t);
    } else {
      const ph = document.createElement('div');
      ph.className = 'lb-thumb-ph';
      ph.textContent = i + 1;
      ph.addEventListener('click', () => showPhoto(i));
      strip.appendChild(ph);
    }
  });
}

/* ── Event listeners ── */
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => showPhoto(currentIdx - 1));
document.getElementById('lb-next').addEventListener('click', () => showPhoto(currentIdx + 1));
document.getElementById('lb-arrow-prev').addEventListener('click', () => showPhoto(currentIdx - 1));
document.getElementById('lb-arrow-next').addEventListener('click', () => showPhoto(currentIdx + 1));

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  showPhoto(currentIdx - 1);
  if (e.key === 'ArrowRight') showPhoto(currentIdx + 1);
  if (e.key === 'Escape')     closeLightbox();
});

// Click outside image to close
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') ||
      e.target.classList.contains('lb-stage')) closeLightbox();
});

// Swipe support on mobile
let touchStartX = 0;
document.getElementById('lb-stage').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.getElementById('lb-stage').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) showPhoto(currentIdx + 1);
    else showPhoto(currentIdx - 1);
  }
}, { passive: true });

// Category tab switching
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`cat-${btn.dataset.cat}`).classList.add('active');
  });
});

// Init
buildAllSections();
</script>
